services:
  - type: web
    name: internbuddy-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: internbuddy-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: NVIDIA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://aswin-m-kumar.github.io"

databases:
  - name: internbuddy-db
    plan: free
